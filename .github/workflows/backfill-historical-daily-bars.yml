name: Backfill historical daily bars

on:
  workflow_dispatch:
    inputs:
      max_tasks:
        description: Maximum FinMind symbols processed in this run
        required: true
        default: 60
        type: number
  schedule:
    # One resumable worker every hour. FinMind quota and storage guards may stop a run early.
    - cron: "17 * * * *"

permissions:
  contents: read

concurrency:
  group: historical-daily-bar-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv with dependency caching
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Synchronize locked environment
        run: uv sync --frozen

      - name: Require backfill credentials
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          for name in FINMIND_TOKEN SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY; do
            if [[ -z "${!name:-}" ]]; then
              echo "Required repository secret is not configured: $name"
              exit 1
            fi
          done

      - name: Run quota-aware resumable backfill
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          API_HTTP_TIMEOUT_SECONDS: "30"
          MAX_TASKS: ${{ inputs.max_tasks || 60 }}
          FINMIND_QUOTA_RESERVE: "20"
          HISTORICAL_BACKFILL_MAX_RUNTIME_SECONDS: "1200"
          HISTORICAL_BACKFILL_MAX_DATABASE_BYTES: "420000000"
        shell: bash
        run: |
          set -euo pipefail
          uv run python -m scripts.backfill_historical_daily_bars \
            --start-date 2021-07-19 \
            --end-date 2026-07-17 \
            --max-tasks "$MAX_TASKS" \
            --output historical-backfill-summary.json

      - name: Preserve backfill audit summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: historical-backfill-${{ github.run_id }}
          path: historical-backfill-summary.json
          if-no-files-found: warn
          retention-days: 90
