name: Backfill official TAIEX monthly OHLC

on:
  workflow_dispatch:
    inputs:
      start_month:
        description: First completed Gregorian month (YYYY-MM-01)
        required: true
        default: "2018-01-01"
        type: string
      end_month:
        description: Last completed month; blank uses the prior Taipei month
        required: false
        type: string
      max_tasks:
        description: Maximum monthly requests in this run (1-24)
        required: true
        default: "24"
        type: string
  schedule:
    # Daily 03:40 Asia/Taipei. The repository variable keeps this dormant.
    - cron: "40 19 * * *"

permissions:
  contents: read

concurrency:
  group: taiex-price-index-ohlc-backfill
  cancel-in-progress: false

jobs:
  archive:
    if: ${{ vars.TAIEX_PRICE_INDEX_OHLC_BACKFILL_ENABLED == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install uv with dependency caching
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Synchronize locked environment
        run: uv sync --frozen

      - name: Archive bounded official monthly responses
        env:
          INPUT_START_MONTH: ${{ inputs.start_month || '2018-01-01' }}
          INPUT_END_MONTH: ${{ inputs.end_month || '' }}
          INPUT_MAX_TASKS: ${{ inputs.max_tasks || '24' }}
          R2_ACCOUNT_ID: ${{ vars.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          HISTORICAL_BACKFILL_STORAGE_TARGET: R2
          HISTORICAL_BACKFILL_MAX_ARCHIVE_OBJECT_BYTES: "10000000"
        shell: bash
        run: |
          args=(
            --start-month "$INPUT_START_MONTH"
            --max-tasks "$INPUT_MAX_TASKS"
            --request-interval-seconds 1.0
            --output taiex-monthly-ohlc-summary.json
          )
          if [[ -n "$INPUT_END_MONTH" ]]; then
            args+=(--end-month "$INPUT_END_MONTH")
          fi
          uv run python -m scripts.backfill_taiex_monthly_ohlc "${args[@]}"

      - name: Preserve research-only queue summary
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: taiex-monthly-ohlc-${{ github.run_id }}
          path: taiex-monthly-ohlc-summary.json
          if-no-files-found: warn
          retention-days: 90
