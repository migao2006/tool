name: Publish TPEX latest research snapshot

on:
  workflow_dispatch:
    inputs:
      prepared_run_id:
        description: Optional successful TPEX prepared dataset run ID
        required: false
        type: string
      feature_run_id:
        description: Optional successful TPEX feature dataset run ID
        required: false
        type: string
      as_of_date:
        description: Optional exact research date in YYYY-MM-DD format
        required: false
        type: string
      target_environment:
        description: Manual publish destination; daily automation uses daily-research-model.yml
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

permissions:
  actions: read
  contents: read

concurrency:
  group: tpex-latest-research-publish
  cancel-in-progress: false

jobs:
  infer-and-publish:
    if: ${{ vars.TPEX_DAILY_RESEARCH_PREDICTION_ENABLED == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 150
    environment: ${{ inputs.target_environment }}
    env:
      REQUESTED_PREPARED_RUN_ID: ${{ inputs.prepared_run_id }}
      REQUESTED_FEATURE_RUN_ID: ${{ inputs.feature_run_id }}
      REQUESTED_AS_OF_DATE: ${{ inputs.as_of_date }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ALPHA_LENS_TARGET_ENVIRONMENT: ${{ inputs.target_environment }}
      RESEARCH_PREDICTION_SUPABASE_PUBLISH_ENABLED: "true"
      RESEARCH_PREDICTION_PRODUCTION_PUBLISH_ENABLED: ${{ inputs.target_environment == 'production' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Resolve and authenticate artifact-producing workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          git fetch --no-tags origin \
            "+refs/heads/main:refs/remotes/origin/main"

          resolve_run() {
            local requested="$1"
            local workflow="$2"
            if [[ -n "$requested" ]]; then
              printf '%s' "$requested"
              return
            fi
            gh api \
              "repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow}/runs?branch=main&status=success&per_page=1" \
              --jq '.workflow_runs[0].id // empty'
          }

          verify_run() {
            local label="$1"
            local run_id="$2"
            local expected_workflow="$3"
            local expected_artifact="$4"
            local conclusion
            local event
            local head_branch
            local head_sha
            local head_repository
            local repository
            local status
            local workflow_path
            local artifact_id
            local artifact_digest
            local artifact_rows

            if [[ ! "$run_id" =~ ^[1-9][0-9]*$ ]]; then
              echo "No trusted ${label} workflow run is available" >&2
              return 1
            fi
            IFS=$'\t' read -r \
              status conclusion event head_branch head_sha workflow_path repository head_repository < <(
              gh api \
                "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}" \
                --jq '[.status // "", .conclusion // "", .event // "", .head_branch // "", .head_sha // "", .path // "", .repository.full_name // "", .head_repository.full_name // ""] | @tsv'
            )
            workflow_path="${workflow_path%%@*}"
            if [[
              "$workflow_path" != "$expected_workflow" ||
              "$repository" != "$GITHUB_REPOSITORY" ||
              "$head_repository" != "$GITHUB_REPOSITORY"
            ]]; then
              echo "Untrusted ${label} workflow path" >&2
              return 1
            fi
            if [[
              "$status" != "completed" ||
              "$conclusion" != "success" ||
              "$event" != "workflow_dispatch" ||
              "$head_branch" != "main"
            ]]; then
              echo "Untrusted ${label} workflow result or branch" >&2
              return 1
            fi
            if [[ ! "$head_sha" =~ ^[0-9a-f]{40}$ ]]; then
              echo "Invalid ${label} workflow head SHA" >&2
              return 1
            fi
            if ! git merge-base --is-ancestor "$head_sha" "$GITHUB_SHA"; then
              echo "Untrusted ${label} workflow head is not an ancestor of this run" >&2
              return 1
            fi
            artifact_rows="$(
              gh api --paginate \
                "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/artifacts?per_page=100" \
                --jq ".artifacts[] | select(.name == \"${expected_artifact}\" and .expired == false) | [.id, .digest // \"\"] | @tsv"
            )"
            if [[ -z "$artifact_rows" || "$(printf '%s\n' "$artifact_rows" | wc -l)" != "1" ]]; then
              echo "Trusted ${label} workflow must expose one expected artifact" >&2
              return 1
            fi
            IFS=$'\t' read -r artifact_id artifact_digest <<< "$artifact_rows"
            if [[ ! "$artifact_id" =~ ^[1-9][0-9]*$ ]]; then
              echo "Trusted ${label} artifact ID is invalid" >&2
              return 1
            fi
            if [[ ! "$artifact_digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              echo "Trusted ${label} artifact digest is missing or invalid" >&2
              return 1
            fi
            printf '%s\t%s\t%s' "$head_sha" "$artifact_id" "$artifact_digest"
          }

          prepared_run_id="$(resolve_run \
            "$REQUESTED_PREPARED_RUN_ID" \
            "build-tpex-prepared-research-dataset.yml")"
          feature_run_id="$(resolve_run \
            "$REQUESTED_FEATURE_RUN_ID" \
            "build-tpex-research-feature-dataset.yml")"

          prepared_artifact_identity="$(verify_run \
            "prepared dataset" \
            "$prepared_run_id" \
            ".github/workflows/build-tpex-prepared-research-dataset.yml" \
            "tpex-prepared-research-${prepared_run_id}")"
          IFS=$'\t' read -r \
            prepared_run_sha prepared_artifact_id prepared_artifact_digest \
            <<< "$prepared_artifact_identity"
          feature_artifact_identity="$(verify_run \
            "feature dataset" \
            "$feature_run_id" \
            ".github/workflows/build-tpex-research-feature-dataset.yml" \
            "tpex-research-features-${feature_run_id}")"
          IFS=$'\t' read -r \
            feature_run_sha feature_artifact_id feature_artifact_digest \
            <<< "$feature_artifact_identity"

          if [[ -z "$REQUESTED_AS_OF_DATE" ]]; then
            required_as_of_date="$(TZ=Asia/Taipei date +%F)"
          else
            if [[ ! "$REQUESTED_AS_OF_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
              echo "as_of_date must use YYYY-MM-DD" >&2
              exit 1
            fi
            normalized_as_of_date="$(date -u -d "$REQUESTED_AS_OF_DATE" +%F 2>/dev/null)" || {
              echo "as_of_date is not a valid calendar date" >&2
              exit 1
            }
            if [[ "$normalized_as_of_date" != "$REQUESTED_AS_OF_DATE" ]]; then
              echo "as_of_date is not canonical YYYY-MM-DD" >&2
              exit 1
            fi
            required_as_of_date="$REQUESTED_AS_OF_DATE"
          fi
          {
            echo "PREPARED_RUN_ID=$prepared_run_id"
            echo "FEATURE_RUN_ID=$feature_run_id"
            echo "PREPARED_ARTIFACT_ID=$prepared_artifact_id"
            echo "PREPARED_ARTIFACT_DIGEST=$prepared_artifact_digest"
            echo "FEATURE_ARTIFACT_ID=$feature_artifact_id"
            echo "FEATURE_ARTIFACT_DIGEST=$feature_artifact_digest"
            echo "TPEX_PREPARED_SOURCE_RUN_ID=$prepared_run_id"
            echo "TPEX_PREPARED_SOURCE_RUN_SHA=$prepared_run_sha"
            echo "TPEX_PREPARED_SOURCE_ARTIFACT_ID=$prepared_artifact_id"
            echo "TPEX_PREPARED_SOURCE_ARTIFACT_DIGEST=$prepared_artifact_digest"
            echo "TPEX_FEATURE_SOURCE_RUN_ID=$feature_run_id"
            echo "TPEX_FEATURE_SOURCE_RUN_SHA=$feature_run_sha"
            echo "TPEX_FEATURE_SOURCE_ARTIFACT_ID=$feature_artifact_id"
            echo "TPEX_FEATURE_SOURCE_ARTIFACT_DIGEST=$feature_artifact_digest"
            echo "REQUIRED_AS_OF_DATE=$required_as_of_date"
          } >> "$GITHUB_ENV"

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install uv with dependency caching
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Synchronize locked environment
        run: uv sync --frozen

      - name: Require isolated target credentials
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REF" = "refs/heads/main"
          test -n "$SUPABASE_PROJECT_REF"
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_SERVICE_ROLE_KEY"
          case "$ALPHA_LENS_TARGET_ENVIRONMENT" in
            staging)
              test "$RESEARCH_PREDICTION_PRODUCTION_PUBLISH_ENABLED" = "false"
              ;;
            production)
              test "$GITHUB_EVENT_NAME" = "workflow_dispatch"
              test "$RESEARCH_PREDICTION_PRODUCTION_PUBLISH_ENABLED" = "true"
              ;;
            *)
              echo "Unsupported publish environment" >&2
              exit 1
              ;;
          esac
          case "$SUPABASE_URL" in
            "https://${SUPABASE_PROJECT_REF}.supabase.co"|\
            "https://${SUPABASE_PROJECT_REF}.supabase.co/") ;;
            *)
              echo "Supabase URL does not match the selected project ref" >&2
              exit 1
              ;;
          esac

      - name: Download verified TPEX prepared research dataset
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ env.PREPARED_ARTIFACT_ID }}
          path: inputs/prepared
          merge-multiple: true
          digest-mismatch: error
          github-token: ${{ github.token }}
          run-id: ${{ env.PREPARED_RUN_ID }}

      - name: Download verified TPEX feature-only dataset
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ env.FEATURE_ARTIFACT_ID }}
          path: inputs/features
          merge-multiple: true
          digest-mismatch: error
          github-token: ${{ github.token }}
          run-id: ${{ env.FEATURE_RUN_ID }}

      - name: Fit TPEX bundle and publish only an exact-date research snapshot
        run: >-
          uv run python -m scripts.publish_tpex_daily_research_snapshot
          --prepared-input inputs/prepared/tpex-prepared-research.parquet
          --prepared-audit inputs/prepared/tpex-prepared-research-audit.json
          --feature-input inputs/features/tpex-research-features.parquet
          --feature-audit inputs/features/tpex-research-features-audit.json
          --artifact-root artifacts
          --report tpex-latest-research-publish-report.json
          --required-as-of-date "$REQUIRED_AS_OF_DATE"
          --horizon 5
          --publish-supabase

      - name: Preserve TPEX bundle, snapshot, and audit
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tpex-latest-research-${{ github.run_id }}
          path: |
            artifacts/**/*
            tpex-latest-research-publish-report.json
          if-no-files-found: error
          retention-days: 90
