name: Build TPEX prepared research dataset

on:
  workflow_dispatch:
    inputs:
      feature_run_id:
        description: Successful TPEX feature workflow run ID
        required: true
        type: string
      cost_profile:
        description: Versioned transaction-cost scenario
        required: true
        default: base_cost
        type: choice
        options:
          - low_cost
          - base_cost
          - stressed_cost
          - extreme_cost

permissions:
  actions: read
  contents: read

concurrency:
  group: tpex-prepared-research-dataset
  cancel-in-progress: false

jobs:
  build:
    if: ${{ vars.TPEX_PREPARED_RESEARCH_DATASET_ENABLED == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install uv with dependency caching
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Synchronize locked environment
        run: uv sync --frozen

      - name: Verify trusted TPEX feature dataset run
        id: feature-source
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          FEATURE_RUN_ID: ${{ inputs.feature_run_id }}
        with:
          script: |
            const value = process.env.FEATURE_RUN_ID || "";
            if (!/^[1-9][0-9]*$/.test(value)) {
              core.setFailed("feature_run_id must be a positive integer");
              return;
            }
            const runId = Number(value);
            if (!Number.isSafeInteger(runId)) {
              core.setFailed("feature_run_id exceeds the safe integer range");
              return;
            }
            const { owner, repo } = context.repo;
            const response = await github.rest.actions.getWorkflowRun({
              owner,
              repo,
              run_id: runId,
            });
            const run = response.data;
            const expectedPath = ".github/workflows/build-tpex-research-feature-dataset.yml";
            if (
              run.repository.full_name !== `${owner}/${repo}` ||
              run.head_repository?.full_name !== `${owner}/${repo}` ||
              run.path !== expectedPath ||
              run.event !== "workflow_dispatch" ||
              run.head_branch !== "main" ||
              run.status !== "completed" ||
              run.conclusion !== "success" ||
              !/^[0-9a-f]{40}$/.test(run.head_sha)
            ) {
              core.setFailed("feature dataset run is not a trusted successful main run");
              return;
            }
            const comparison = await github.rest.repos.compareCommitsWithBasehead({
              owner,
              repo,
              basehead: `${run.head_sha}...${context.sha}`,
            });
            if (!["ahead", "identical"].includes(comparison.data.status)) {
              core.setFailed("feature dataset commit is not an ancestor of this prepared run");
              return;
            }
            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              { owner, repo, run_id: runId, per_page: 100 },
            );
            const expectedArtifact = `tpex-research-features-${runId}`;
            const matches = artifacts.filter(
              (artifact) => artifact.name === expectedArtifact && !artifact.expired,
            );
            if (matches.length !== 1) {
              core.setFailed("feature dataset run must contain one unexpired expected artifact");
              return;
            }
            const artifact = matches[0];
            const digest = typeof artifact.digest === "string"
              ? artifact.digest.trim().toLowerCase()
              : "";
            if (!digest || !/^sha256:[0-9a-f]{64}$/.test(digest)) {
              core.setFailed("feature dataset artifact digest is missing or invalid");
              return;
            }
            core.setOutput("run_id", String(runId));
            core.setOutput("head_sha", run.head_sha);
            core.setOutput("artifact_id", String(artifact.id));
            core.setOutput("artifact_digest", digest);

      - name: Download verified TPEX feature artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ steps.feature-source.outputs.artifact_id }}
          path: inputs/feature
          merge-multiple: true
          digest-mismatch: error
          github-token: ${{ github.token }}
          run-id: ${{ steps.feature-source.outputs.run_id }}

      - name: Assemble read-back verified TPEX five-day research rows
        env:
          INPUT_COST_PROFILE: ${{ inputs.cost_profile }}
          FEATURE_SOURCE_RUN_ID: ${{ steps.feature-source.outputs.run_id }}
          FEATURE_SOURCE_RUN_SHA: ${{ steps.feature-source.outputs.head_sha }}
          FEATURE_SOURCE_ARTIFACT_ID: ${{ steps.feature-source.outputs.artifact_id }}
          FEATURE_SOURCE_ARTIFACT_DIGEST: ${{ steps.feature-source.outputs.artifact_digest }}
          R2_ACCOUNT_ID: ${{ vars.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: >-
          uv run python -m scripts.build_tpex_prepared_research_dataset
          --feature inputs/feature/tpex-research-features.parquet
          --feature-manifest inputs/feature/tpex-research-features-audit.json
          --output tpex-prepared-research.parquet
          --audit tpex-prepared-research-audit.json
          --horizon 5
          --cost-profile "$INPUT_COST_PROFILE"
          --feature-source-run-id "$FEATURE_SOURCE_RUN_ID"
          --feature-source-run-sha "$FEATURE_SOURCE_RUN_SHA"
          --feature-source-artifact-id "$FEATURE_SOURCE_ARTIFACT_ID"
          --feature-source-artifact-digest "$FEATURE_SOURCE_ARTIFACT_DIGEST"

      - name: Preserve TPEX prepared research dataset
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tpex-prepared-research-${{ github.run_id }}
          path: |
            tpex-prepared-research.parquet
            tpex-prepared-research-audit.json
          if-no-files-found: error
          retention-days: 30
