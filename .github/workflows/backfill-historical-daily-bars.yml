name: Backfill historical daily bars

on:
  workflow_dispatch:
    inputs:
      max_tasks:
        description: Maximum FinMind symbols processed by each credential
        required: true
        default: 20
        type: number
  schedule:
    # Three isolated credential workers share one resumable queue every hour.
    # Quota, runtime, and storage guards may stop any worker early.
    - cron: "17 * * * *"

permissions:
  contents: read

concurrency:
  group: historical-daily-bar-backfill
  cancel-in-progress: false

jobs:
  primary:
    uses: ./.github/workflows/historical-daily-bar-backfill-worker.yml
    with:
      credential_slot: primary
      max_tasks: ${{ inputs.max_tasks || 20 }}
      r2_account_id: ${{ vars.R2_ACCOUNT_ID }}
      r2_bucket_name: ${{ vars.R2_BUCKET_NAME }}
    secrets:
      finmind_token: ${{ secrets.FINMIND_TOKEN }}
      r2_access_key_id: ${{ secrets.R2_ACCESS_KEY_ID }}
      r2_secret_access_key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      supabase_url: ${{ secrets.SUPABASE_URL }}
      supabase_service_role_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  secondary:
    uses: ./.github/workflows/historical-daily-bar-backfill-worker.yml
    with:
      credential_slot: secondary
      max_tasks: ${{ inputs.max_tasks || 20 }}
      r2_account_id: ${{ vars.R2_ACCOUNT_ID }}
      r2_bucket_name: ${{ vars.R2_BUCKET_NAME }}
    secrets:
      finmind_token: ${{ secrets.FINMIND_TOKEN_SECONDARY }}
      r2_access_key_id: ${{ secrets.R2_ACCESS_KEY_ID }}
      r2_secret_access_key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      supabase_url: ${{ secrets.SUPABASE_URL }}
      supabase_service_role_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  tertiary:
    uses: ./.github/workflows/historical-daily-bar-backfill-worker.yml
    with:
      credential_slot: tertiary
      max_tasks: ${{ inputs.max_tasks || 20 }}
      r2_account_id: ${{ vars.R2_ACCOUNT_ID }}
      r2_bucket_name: ${{ vars.R2_BUCKET_NAME }}
    secrets:
      finmind_token: ${{ secrets.FINMIND_TOKEN_TERTIARY }}
      r2_access_key_id: ${{ secrets.R2_ACCESS_KEY_ID }}
      r2_secret_access_key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      supabase_url: ${{ secrets.SUPABASE_URL }}
      supabase_service_role_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
