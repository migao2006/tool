name: Import current total-return benchmarks

on:
  workflow_dispatch:
    inputs:
      snapshot_date:
        description: Retrieval date in Asia/Taipei; blank means today
        required: false
        default: ""
        type: string
      dry_run:
        description: Fetch and validate without writing to Supabase
        required: true
        default: true
        type: boolean
  schedule:
    # Weekdays at 20:35 Asia/Taipei, after company-action ingestion.
    - cron: "35 12 * * 1-5"

permissions:
  contents: read

concurrency:
  group: import-benchmarks
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.lock
      - name: Install pinned dependencies
        run: python -m pip install --requirement requirements.lock
      - name: Import observed total-return index closes
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          API_HTTP_TIMEOUT_SECONDS: "30"
          REQUESTED_SNAPSHOT_DATE: ${{ inputs.snapshot_date }}
          DRY_RUN: ${{ inputs.dry_run }}
        shell: bash
        run: |
          args=()
          if [[ -n "$REQUESTED_SNAPSHOT_DATE" ]]; then
            args+=(--snapshot-date "$REQUESTED_SNAPSHOT_DATE")
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "$DRY_RUN" == "true" ]]; then
            args+=(--dry-run)
          fi
          python -m scripts.import_benchmarks "${args[@]}" \
            | tee benchmark-import-summary.json
      - name: Preserve import audit summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-import-${{ github.run_id }}
          path: benchmark-import-summary.json
          if-no-files-found: warn
          retention-days: 90
