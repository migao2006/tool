name: Update Taiwan market snapshot

on:
  workflow_dispatch:
  schedule:
    # Weekdays 22:30 Asia/Taipei (14:30 UTC). Supabase owns upstream collection;
    # this workflow exports the last-good backend. A point-in-time backtest
    # sample is sealed only after every market reaches its coverage threshold.
    - cron: "30 14 * * 1-5"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: market-data-snapshot
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Optional public Repository Variables for a fork/new Supabase project.
      # Empty values intentionally fall back to the checked-in current project.
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Export the centrally rate-limited persistent backend
        run: npm run export-data
      - name: Generate novice-friendly daily market report
        run: npm run update-report
      - name: Rebuild point-in-time backtest when enough snapshots exist
        run: npm run backtest:snapshots
      - name: Validate generated files
        run: npm test
      - name: Upload the validated snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: taiwan-market-snapshot-${{ github.run_id }}
          path: |
            public/data/latest.json
            public/data/backtest.json
            public/data/daily-report.json
            data/snapshots
          if-no-files-found: error
          retention-days: 14
      - name: Detect snapshot changes
        id: changes
        run: |
          git add public/data/latest.json public/data/backtest.json public/data/daily-report.json data/snapshots
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Open a reviewable snapshot pull request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="automation/market-snapshot-${GITHUB_RUN_ID}"
          git config user.name "tw-stock-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git switch -c "$branch"
          git commit -m "data: propose Taiwan market snapshot"
          git push origin "HEAD:refs/heads/$branch"
          gh pr create \
            --base main \
            --head "$branch" \
            --title "data: update Taiwan market snapshot" \
            --body "Automated, validated point-in-time market snapshot. Merge review is required before the Git-integrated production deployment can start."
