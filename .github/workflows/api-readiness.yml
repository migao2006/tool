name: API readiness

on:
  workflow_dispatch:
  schedule:
    - cron: "35 12 * * 1-5"
  push:
    paths:
      - ".github/workflows/api-readiness.yml"
      - ".env.example"
      - "scripts/check_data_apis.py"
      - "src/data/providers/**"
      - "tests/test_data_providers.py"

permissions:
  contents: read

concurrency:
  group: api-readiness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          # requirements.lock includes the complete model stack and NumPy 2.5,
          # which requires Python 3.12 or newer.
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.lock
      - name: Install pinned dependencies
        run: python -m pip install --requirement requirements.lock
      - name: Check configured and public APIs
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          FUGLE_API_KEY: ${{ secrets.FUGLE_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m scripts.check_data_apis --live
