name: Import official delisting registry

on:
  workflow_dispatch:
    inputs:
      snapshot_date:
        description: Retrieval date in Asia/Taipei; blank means today
        required: false
        default: ""
        type: string
      dry_run:
        description: Fetch and validate without writing to Supabase
        required: true
        default: true
        type: boolean
  schedule:
    # Sunday 10:15 Asia/Taipei. This registry changes infrequently.
    - cron: "15 2 * * 0"

permissions:
  contents: read

concurrency:
  group: import-delisting-registry
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.lock
      - name: Install pinned dependencies
        run: python -m pip install --requirement requirements.lock
      - name: Import unresolved official delisting events
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          API_HTTP_TIMEOUT_SECONDS: "30"
          REQUESTED_SNAPSHOT_DATE: ${{ inputs.snapshot_date }}
          DRY_RUN: ${{ inputs.dry_run }}
        shell: bash
        run: |
          args=()
          if [[ -n "$REQUESTED_SNAPSHOT_DATE" ]]; then
            args+=(--snapshot-date "$REQUESTED_SNAPSHOT_DATE")
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "$DRY_RUN" == "true" ]]; then
            args+=(--dry-run)
          fi
          python -m scripts.import_delisting_registry "${args[@]}" \
            | tee delisting-registry-summary.json
      - name: Preserve import audit summary
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: delisting-registry-${{ github.run_id }}
          path: delisting-registry-summary.json
          if-no-files-found: warn
          retention-days: 90
