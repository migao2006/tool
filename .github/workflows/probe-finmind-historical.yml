name: Probe FinMind historical daily bars

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: Comma-separated explicit symbols (maximum 20)
        required: true
        default: "2330,2317"
        type: string
      start_date:
        description: Inclusive start date (YYYY-MM-DD)
        required: true
        type: string
      end_date:
        description: Inclusive end date (YYYY-MM-DD, maximum five years)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: probe-finmind-historical
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.lock
      - name: Install pinned dependencies
        run: python -m pip install --requirement requirements.lock
      - name: Run bounded read-only probe
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          PROBE_SYMBOLS: ${{ inputs.symbols }}
          PROBE_START_DATE: ${{ inputs.start_date }}
          PROBE_END_DATE: ${{ inputs.end_date }}
          API_HTTP_TIMEOUT_SECONDS: "30"
        run: >-
          python -m scripts.probe_finmind_historical
          --symbols "$PROBE_SYMBOLS"
          --start-date "$PROBE_START_DATE"
          --end-date "$PROBE_END_DATE"
          --pacing-seconds 7.5
          --output finmind-historical-probe.json
      - name: Preserve audit summary
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: finmind-historical-probe-${{ github.run_id }}
          path: finmind-historical-probe.json
          if-no-files-found: warn
          retention-days: 30
