name: Project tests

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    # Weekly full regression: Monday 02:20 Asia/Taipei.
    - cron: "20 18 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: project-tests-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: Select test scopes
    runs-on: ubuntu-24.04
    outputs:
      python: ${{ steps.scope.outputs.python }}
      frontend: ${{ steps.scope.outputs.frontend }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Detect affected scopes
        id: scope
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            echo "python=true" >> "$GITHUB_OUTPUT"
            echo "frontend=true" >> "$GITHUB_OUTPUT"
            echo "Non-PR run: selecting the complete regression suite."
            exit 0
          fi

          git fetch --no-tags origin \
            "refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}"
          merge_base="$(git merge-base HEAD "origin/${BASE_REF}")"
          mapfile -t changed_files < <(
            git diff --name-only --diff-filter=ACMR "$merge_base" HEAD
          )

          python=false
          frontend=false

          for path in "${changed_files[@]}"; do
            case "$path" in
              .github/workflows/project-tests.yml|.github/actions/*)
                python=true
                frontend=true
                ;;
              tests/support/frontend_api_fixture_server.py)
                python=true
                frontend=true
                ;;
              .github/workflows/backfill-historical-daily-bars.yml|pyproject.toml|uv.lock|requirements.lock|config/*|scripts/*.py|src/*.py|tests/*.py|supabase/*)
                python=true
                ;;
              package.json|pnpm-lock.yaml|biome.json|playwright.config.*|index.html|app.js|styles.css|src/*.js|src/*.css|tests/e2e/*)
                frontend=true
                ;;
              AGENTS.md|*.md|docs/*|artifacts/*|.gitignore)
                # Documentation and generated research artifacts do not execute.
                ;;
              *)
                # Unknown files are treated conservatively to avoid missed regressions.
                python=true
                frontend=true
                ;;
            esac
          done

          printf 'python=%s\n' "$python" | tee -a "$GITHUB_OUTPUT"
          printf 'frontend=%s\n' "$frontend" | tee -a "$GITHUB_OUTPUT"
          printf 'Changed files:\n%s\n' "${changed_files[*]:-(none)}"

  python-tests:
    name: Python tests
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv with dependency caching
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Synchronize locked test environment
        run: uv sync --frozen --extra test

      - name: Run Python tests
        run: uv run pytest

  frontend-tests:
    name: Frontend and browser tests
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv with dependency caching
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - uses: pnpm/action-setup@v6.0.9

      - name: Configure Node.js with pnpm store caching
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install locked frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Synchronize fixture-server dependencies
        run: uv sync --frozen --extra test

      - name: Discover browser tests
        run: pnpm run check

      - name: Install Chromium and WebKit runtimes
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: Run browser tests with configured workers
        run: pnpm run test:e2e

      - name: Preserve mobile UI audit screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mobile-ui-audit-${{ github.run_id }}
          path: |
            artifacts/mobile-ui-audit/**/*
            artifacts/playwright-results/**/*
            playwright-report/**/*
          if-no-files-found: ignore
          retention-days: 7

  test-gate:
    name: Test gate
    if: always()
    needs:
      - changes
      - python-tests
      - frontend-tests
    runs-on: ubuntu-24.04
    steps:
      - name: Require every selected scope to pass
        shell: bash
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          FRONTEND_RESULT: ${{ needs.frontend-tests.result }}
          PYTHON_RESULT: ${{ needs.python-tests.result }}
        run: |
          set -euo pipefail
          for result in "$CHANGES_RESULT" "$PYTHON_RESULT" "$FRONTEND_RESULT"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "A required test scope did not pass (result: $result)."
              exit 1
            fi
          done
