name: Import bounded historical daily bars

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: Explicit comma-separated symbols (maximum 20)
        required: true
        default: "1101,1201,2371,2913,2801,1102,2101,1718,1903,9902,5301,5302,5601,4702,4502,5529,8905,5309,5310,8906"
        type: string
      start_date:
        description: Inclusive start date (maximum five years)
        required: true
        default: "2021-07-19"
        type: string
      end_date:
        description: Inclusive end date
        required: true
        default: "2026-07-17"
        type: string
      write_to_supabase:
        description: Write research-only landing rows after validation
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: import-historical-daily-bars
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.lock
      - name: Install pinned dependencies
        run: python -m pip install --requirement requirements.lock
      - name: Import bounded research-only landing batch
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          IMPORT_SYMBOLS: ${{ inputs.symbols }}
          IMPORT_START_DATE: ${{ inputs.start_date }}
          IMPORT_END_DATE: ${{ inputs.end_date }}
          WRITE_TO_SUPABASE: ${{ inputs.write_to_supabase }}
          API_HTTP_TIMEOUT_SECONDS: "30"
        shell: bash
        run: |
          args=()
          if [[ "$WRITE_TO_SUPABASE" == "true" ]]; then
            args+=(--write)
          fi
          python -m scripts.import_historical_daily_bars \
            --symbols "$IMPORT_SYMBOLS" \
            --start-date "$IMPORT_START_DATE" \
            --end-date "$IMPORT_END_DATE" \
            --pacing-seconds 7.5 \
            --output historical-daily-bar-import.json \
            "${args[@]}"
      - name: Preserve import audit summary
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: historical-daily-bar-import-${{ github.run_id }}
          path: historical-daily-bar-import.json
          if-no-files-found: warn
          retention-days: 90
