name: Build TWSE prepared research dataset

on:
  workflow_dispatch:
    inputs:
      feature_run_id:
        description: Successful TWSE feature workflow run ID
        required: true
        type: string
      calendar_run_id:
        description: Successful TWSE calendar workflow run ID
        required: true
        type: string
      cost_profile:
        description: Versioned transaction-cost scenario
        required: true
        default: base_cost
        type: choice
        options:
          - low_cost
          - base_cost
          - stressed_cost
          - extreme_cost

permissions:
  actions: read
  contents: read

concurrency:
  group: twse-prepared-research-dataset
  cancel-in-progress: false

jobs:
  build:
    if: ${{ vars.TWSE_PREPARED_RESEARCH_DATASET_ENABLED == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install uv with dependency caching
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Synchronize locked environment
        run: uv sync --frozen

      - name: Download verified feature artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: twse-research-features-${{ inputs.feature_run_id }}
          path: inputs/feature
          github-token: ${{ github.token }}
          run-id: ${{ inputs.feature_run_id }}

      - name: Download versioned calendar snapshot
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: twse-trading-calendar-${{ inputs.calendar_run_id }}
          path: inputs/calendar
          github-token: ${{ github.token }}
          run-id: ${{ inputs.calendar_run_id }}

      - name: Assemble read-back verified five-day research rows
        env:
          INPUT_COST_PROFILE: ${{ inputs.cost_profile }}
          R2_ACCOUNT_ID: ${{ vars.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: >-
          uv run python -m scripts.build_twse_prepared_research_dataset
          --feature inputs/feature/twse-research-features.parquet
          --feature-manifest inputs/feature/twse-research-features-audit.json
          --trading-calendar-snapshot
          inputs/calendar/twse-trading-calendar-snapshot.json
          --output twse-prepared-research.parquet
          --audit twse-prepared-research-audit.json
          --horizon 5
          --cost-profile "$INPUT_COST_PROFILE"

      - name: Preserve prepared research dataset
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: twse-prepared-research-${{ github.run_id }}
          path: |
            twse-prepared-research.parquet
            twse-prepared-research-audit.json
          if-no-files-found: error
          retention-days: 30
