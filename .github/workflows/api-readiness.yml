name: API readiness

on:
  workflow_dispatch:
  schedule:
    - cron: "35 12 * * 1-5"
  push:
    paths:
      - ".github/workflows/api-readiness.yml"
      - ".env.example"
      - "scripts/check_data_apis.py"
      - "src/data/providers/**"
      - "tests/test_data_providers.py"

permissions:
  contents: read

concurrency:
  group: api-readiness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          # requirements.lock includes the complete model stack and NumPy 2.5,
          # which requires Python 3.12 or newer.
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.lock
      - name: Install pinned dependencies
        run: python -m pip install --requirement requirements.lock
      - name: Check configured and public APIs
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          FUGLE_API_KEY: ${{ secrets.FUGLE_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m scripts.check_data_apis --live
