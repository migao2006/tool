project_id = "lfkdkdyaatdlizryiyon"

[functions.twss-sync-batch]
# pg_cron authenticates with an internal token stored in Vault. The function
# rejects every request that cannot pass twss_verify_sync_token().
verify_jwt = false
entrypoint = "./functions/twss-sync-batch/index.ts"

[functions.twss-v19-news]
# The shared Vault token is verified by twss_verify_sync_token(); JWT auth is
# intentionally disabled because pg_cron is the only caller.
verify_jwt = false
entrypoint = "./functions/twss-v19-news/index.ts"

[functions.twss-v20-model]
# pg_cron has no user JWT. The function rejects callers unless the independent
# Vault-backed x-twss-sync-token passes twss_verify_sync_token().
verify_jwt = false
entrypoint = "./functions/twss-v20-model/index.ts"
