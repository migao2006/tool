          database_timeout_ms="${PREDICTION_DATABASE_TIMEOUT_MS:-4000}"
          request_timeout_ms="${PREDICTION_REQUEST_TIMEOUT_MS:-10000}"
          snapshot_read_mode="${PREDICTION_SNAPSHOT_READ_MODE:-rpc}"
          rate_limit_enabled="${PREDICTION_RATE_LIMIT_ENABLED:-false}"
          rate_limit_requests="${PREDICTION_RATE_LIMIT_REQUESTS:-30}"
          rate_limit_window_seconds="${PREDICTION_RATE_LIMIT_WINDOW_SECONDS:-60}"
          rate_limit_client_ip_header="${PREDICTION_RATE_LIMIT_CLIENT_IP_HEADER:-CF-Connecting-IP}"
          settings=(
            "PREDICTION_ALLOWED_ORIGINS=$PREDICTION_ALLOWED_ORIGINS"
            "PREDICTION_STALE_AFTER_HOURS=$stale_hours"
            "PREDICTION_CALENDAR_READY_HOUR_TAIPEI=$calendar_ready_hour_taipei"
            "PREDICTION_CALENDAR_LOOKBACK_DAYS=$calendar_lookback_days"
            "PREDICTION_DATABASE_TIMEOUT_MS=$database_timeout_ms"
            "PREDICTION_REQUEST_TIMEOUT_MS=$request_timeout_ms"
            "PREDICTION_SNAPSHOT_READ_MODE=$snapshot_read_mode"
            "PREDICTION_RATE_LIMIT_ENABLED=$rate_limit_enabled"
            "PREDICTION_RATE_LIMIT_REQUESTS=$rate_limit_requests"
            "PREDICTION_RATE_LIMIT_WINDOW_SECONDS=$rate_limit_window_seconds"
            "PREDICTION_RATE_LIMIT_CLIENT_IP_HEADER=$rate_limit_client_ip_header"
          )
          if [[ "${rate_limit_enabled,,}" == "true" ]]; then
