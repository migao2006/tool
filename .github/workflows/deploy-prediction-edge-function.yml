name: Deploy prediction Edge Function

on:
  pull_request:
    paths:
      - ".github/workflows/deploy-prediction-edge-function.yml"
      - ".github/scripts/smoke-prediction-snapshot.mjs"
      - "supabase/functions/prediction-snapshot/**"
      - "supabase/migrations/20260720170000_prediction_snapshot_rate_limit.sql"
      - "supabase/snippets/validate_prediction_snapshot_rate_limit.sql"
      - "supabase/migrations/20260720190000_prediction_snapshot_read_rpc.sql"
      - "supabase/snippets/validate_prediction_snapshot_read_rpc.sql"
      - "supabase/migrations/20260721090000_prediction_snapshot_calendar_freshness.sql"
      - "supabase/snippets/validate_prediction_snapshot_calendar_freshness.sql"
      - "supabase/config.toml"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-prediction-edge-function.yml"
      - ".github/scripts/smoke-prediction-snapshot.mjs"
      - "supabase/functions/prediction-snapshot/**"
      - "supabase/migrations/20260720170000_prediction_snapshot_rate_limit.sql"
      - "supabase/snippets/validate_prediction_snapshot_rate_limit.sql"
      - "supabase/migrations/20260720190000_prediction_snapshot_read_rpc.sql"
      - "supabase/snippets/validate_prediction_snapshot_read_rpc.sql"
      - "supabase/migrations/20260721090000_prediction_snapshot_calendar_freshness.sql"
      - "supabase/snippets/validate_prediction_snapshot_calendar_freshness.sql"
      - "supabase/config.toml"
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub environment containing the target Supabase project settings
        required: true
        type: choice
        options:
          - staging
          - production
      rpc_migration_verified:
        description: I verified both snapshot RPC migrations, including calendar freshness v2, on every target environment
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: prediction-edge-${{ github.event_name == 'workflow_dispatch' && 'deployment' || github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Edge Function tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: v2.8.1

      - name: Check and test prediction-snapshot
        working-directory: supabase/functions/prediction-snapshot
        run: |
          deno task check
          deno fmt --check
          deno lint
          deno task test

  ref-gate:
    name: Validate deployment ref
    if: github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: ubuntu-24.04
    steps:
      - name: Require main for Production
        shell: bash
        env:
          TARGET_ENVIRONMENT: ${{ inputs.environment }}
        run: |
          set -euo pipefail
          if [[ "$TARGET_ENVIRONMENT" == "production" && "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "Production can only deploy from refs/heads/main." >&2
            exit 1
          fi

  deploy-staging:
    name: Deploy and verify Staging
    if: github.event_name == 'workflow_dispatch'
    needs: ref-gate
    runs-on: ubuntu-24.04
    environment: staging
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      PREDICTION_ALLOWED_ORIGINS: ${{ vars.PREDICTION_ALLOWED_ORIGINS }}
      PREDICTION_STALE_AFTER_HOURS: ${{ vars.PREDICTION_STALE_AFTER_HOURS }}
      PREDICTION_CALENDAR_READY_HOUR_TAIPEI: ${{ vars.PREDICTION_CALENDAR_READY_HOUR_TAIPEI }}
      PREDICTION_CALENDAR_LOOKBACK_DAYS: ${{ vars.PREDICTION_CALENDAR_LOOKBACK_DAYS }}
      PREDICTION_DATABASE_TIMEOUT_MS: ${{ vars.PREDICTION_DATABASE_TIMEOUT_MS }}
      PREDICTION_REQUEST_TIMEOUT_MS: ${{ vars.PREDICTION_REQUEST_TIMEOUT_MS }}
      PREDICTION_SNAPSHOT_READ_MODE: ${{ vars.PREDICTION_SNAPSHOT_READ_MODE }}
      PREDICTION_RATE_LIMIT_ENABLED: ${{ vars.PREDICTION_RATE_LIMIT_ENABLED }}
      PREDICTION_RATE_LIMIT_REQUESTS: ${{ vars.PREDICTION_RATE_LIMIT_REQUESTS }}
      PREDICTION_RATE_LIMIT_WINDOW_SECONDS: ${{ vars.PREDICTION_RATE_LIMIT_WINDOW_SECONDS }}
      PREDICTION_RATE_LIMIT_CLIENT_IP_HEADER: ${{ vars.PREDICTION_RATE_LIMIT_CLIENT_IP_HEADER }}
      PREDICTION_RATE_LIMIT_KEY_SECRET: ${{ secrets.PREDICTION_RATE_LIMIT_KEY_SECRET }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install locked Supabase CLI
        run: pnpm install --frozen-lockfile

      - name: Validate project-scoped deployment settings
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_PROJECT_REF"
          test -n "$SUPABASE_URL"
          test -n "$PREDICTION_ALLOWED_ORIGINS"
          snapshot_read_mode="${PREDICTION_SNAPSHOT_READ_MODE:-rpc}"
          [[ "$snapshot_read_mode" =~ ^(rpc|legacy)$ ]]
          if [[ "$snapshot_read_mode" == "rpc" && "${{ inputs.rpc_migration_verified }}" != "true" ]]; then
            echo "RPC mode requires verified migration attestation." >&2
            exit 1
          fi
          rate_limit_enabled="${PREDICTION_RATE_LIMIT_ENABLED:-false}"
          rate_limit_client_ip_header="${PREDICTION_RATE_LIMIT_CLIENT_IP_HEADER:-CF-Connecting-IP}"
          if [[ "${rate_limit_enabled,,}" == "true" ]]; then
            test "${#PREDICTION_RATE_LIMIT_KEY_SECRET}" -ge 32
            [[ "$rate_limit_client_ip_header" =~ ^[A-Za-z0-9-]{1,64}$ ]]
          fi

      - name: Configure function runtime settings
        shell: bash
        run: |
          set -euo pipefail
          stale_hours="${PREDICTION_STALE_AFTER_HOURS:-72}"
          calendar_ready_hour_taipei="${PREDICTION_CALENDAR_READY_HOUR_TAIPEI:-17}"
          calendar_lookback_days="${PREDICTION_CALENDAR_LOOKBACK_DAYS:-45}"
          [[ "$calendar_ready_hour_taipei" =~ ^([0-9]|1[0-9]|2[0-3])$ ]]
          [[ "$calendar_lookback_days" =~ ^[0-9]+$ ]]
          (( calendar_lookback_days >= 14 && calendar_lookback_days <= 62 ))
          database_timeout_ms="${PREDICTION_DATABASE_TIMEOUT_MS:-4000}"
          request_timeout_ms="${PREDICTION_REQUEST_TIMEOUT_MS:-10000}"
          snapshot_read_mode="${PREDICTION_SNAPSHOT_READ_MODE:-rpc}"
          rate_limit_enabled="${PREDICTION_RATE_LIMIT_ENABLED:-false}"
          rate_limit_requests="${PREDICTION_RATE_LIMIT_REQUESTS:-30}"
          rate_limit_window_seconds="${PREDICTION_RATE_LIMIT_WINDOW_SECONDS:-60}"
          rate_limit_client_ip_header="${PREDICTION_RATE_LIMIT_CLIENT_IP_HEADER:-CF-Connecting-IP}"
          settings=(
            "PREDICTION_ALLOWED_ORIGINS=$PREDICTION_ALLOWED_ORIGINS"
            "PREDICTION_STALE_AFTER_HOURS=$stale_hours"
            "PREDICTION_CALENDAR_READY_HOUR_TAIPEI=$calendar_ready_hour_taipei"
            "PREDICTION_CALENDAR_LOOKBACK_DAYS=$calendar_lookback_days"
            "PREDICTION_DATABASE_TIMEOUT_MS=$database_timeout_ms"
            "PREDICTION_REQUEST_TIMEOUT_MS=$request_timeout_ms"
            "PREDICTION_SNAPSHOT_READ_MODE=$snapshot_read_mode"
            "PREDICTION_RATE_LIMIT_ENABLED=$rate_limit_enabled"
            "PREDICTION_RATE_LIMIT_REQUESTS=$rate_limit_requests"
            "PREDICTION_RATE_LIMIT_WINDOW_SECONDS=$rate_limit_window_seconds"
            "PREDICTION_RATE_LIMIT_CLIENT_IP_HEADER=$rate_limit_client_ip_header"
          )
          if [[ "${rate_limit_enabled,,}" == "true" ]]; then
            settings+=("PREDICTION_RATE_LIMIT_KEY_SECRET=$PREDICTION_RATE_LIMIT_KEY_SECRET")
          fi
          pnpm exec supabase secrets set "${settings[@]}" \
            --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy prediction-snapshot through GitHub
        run: >-
          pnpm exec supabase functions deploy prediction-snapshot
          --project-ref "$SUPABASE_PROJECT_REF"

      - name: Smoke-test public research contract
        run: node .github/scripts/smoke-prediction-snapshot.mjs

  deploy-production:
    name: Deploy and verify Production
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'production'
    needs: deploy-staging
    runs-on: ubuntu-24.04
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      PREDICTION_ALLOWED_ORIGINS: ${{ vars.PREDICTION_ALLOWED_ORIGINS }}
      PREDICTION_STALE_AFTER_HOURS: ${{ vars.PREDICTION_STALE_AFTER_HOURS }}
      PREDICTION_CALENDAR_READY_HOUR_TAIPEI: ${{ vars.PREDICTION_CALENDAR_READY_HOUR_TAIPEI }}
      PREDICTION_CALENDAR_LOOKBACK_DAYS: ${{ vars.PREDICTION_CALENDAR_LOOKBACK_DAYS }}
      PREDICTION_DATABASE_TIMEOUT_MS: ${{ vars.PREDICTION_DATABASE_TIMEOUT_MS }}
      PREDICTION_REQUEST_TIMEOUT_MS: ${{ vars.PREDICTION_REQUEST_TIMEOUT_MS }}
      PREDICTION_SNAPSHOT_READ_MODE: ${{ vars.PREDICTION_SNAPSHOT_READ_MODE }}
      PREDICTION_RATE_LIMIT_ENABLED: ${{ vars.PREDICTION_RATE_LIMIT_ENABLED }}
      PREDICTION_RATE_LIMIT_REQUESTS: ${{ vars.PREDICTION_RATE_LIMIT_REQUESTS }}
      PREDICTION_RATE_LIMIT_WINDOW_SECONDS: ${{ vars.PREDICTION_RATE_LIMIT_WINDOW_SECONDS }}
      PREDICTION_RATE_LIMIT_CLIENT_IP_HEADER: ${{ vars.PREDICTION_RATE_LIMIT_CLIENT_IP_HEADER }}
      PREDICTION_RATE_LIMIT_KEY_SECRET: ${{ secrets.PREDICTION_RATE_LIMIT_KEY_SECRET }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install locked Supabase CLI
        run: pnpm install --frozen-lockfile

      - name: Validate project-scoped deployment settings
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REF" = "refs/heads/main"
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_PROJECT_REF"
          test -n "$SUPABASE_URL"
          test -n "$PREDICTION_ALLOWED_ORIGINS"
          snapshot_read_mode="${PREDICTION_SNAPSHOT_READ_MODE:-rpc}"
          [[ "$snapshot_read_mode" =~ ^(rpc|legacy)$ ]]
          if [[ "$snapshot_read_mode" == "rpc" && "${{ inputs.rpc_migration_verified }}" != "true" ]]; then
