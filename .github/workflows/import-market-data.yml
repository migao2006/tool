name: Import market data

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/import-market-data.yml
      - scripts/import_market_data.py
      - src/data/ingestion/**
      - src/data/providers/**
  workflow_dispatch:
    inputs:
      dry_run:
        description: Fetch and normalize without writing to Supabase
        required: true
        default: false
        type: boolean
  schedule:
    # Weekdays at 19:45 Asia/Taipei, after official daily files settle.
    - cron: "45 11 * * 1-5"

permissions:
  contents: read

concurrency:
  group: import-market-data
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.lock
      - name: Install pinned dependencies
        run: python -m pip install --requirement requirements.lock
      - name: Import audited market data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          API_HTTP_TIMEOUT_SECONDS: "30"
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.dry_run }}" == "true" ]]; then
            python -m scripts.import_market_data --dry-run
          else
            python -m scripts.import_market_data
          fi
