name: Build TWSE research calendar snapshot

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: First research session date
        required: true
        default: "2018-01-01"
        type: string
      end_date:
        description: Last completed research session date
        required: true
        default: "2026-06-30"
        type: string

permissions:
  contents: read

concurrency:
  group: twse-research-calendar-snapshot
  cancel-in-progress: false

jobs:
  build:
    if: ${{ vars.TWSE_RESEARCH_CALENDAR_SNAPSHOT_ENABLED == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install uv with dependency caching
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Synchronize locked environment
        run: uv sync --frozen

      - name: Build versioned calendar snapshot
        env:
          INPUT_START_DATE: ${{ inputs.start_date }}
          INPUT_END_DATE: ${{ inputs.end_date }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: >-
          uv run python -m scripts.build_twse_trading_calendar_snapshot
          --start-date "$INPUT_START_DATE"
          --end-date "$INPUT_END_DATE"
          --output twse-trading-calendar-snapshot.json
          --audit twse-trading-calendar-audit.json

      - name: Preserve calendar snapshot
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: twse-trading-calendar-${{ github.run_id }}
          path: |
            twse-trading-calendar-snapshot.json
            twse-trading-calendar-audit.json
          if-no-files-found: error
          retention-days: 90
