minimum_pre_commit_version: "4.6.0"
default_stages: [pre-commit]
repos:
  - repo: local
    hooks:
      - id: release-manifest-sync
        name: Verify generated release evidence
        entry: python scripts/sync_release_manifest.py --check
        language: system
        pass_filenames: false
      - id: github-action-pins
        name: Verify GitHub Actions are pinned
        entry: python scripts/check_github_action_pins.py
        language: system
        pass_filenames: false
      - id: python-lock-contract
        name: Verify complete exported Python dependency lock
        entry: python scripts/check_python_lock_contract.py
        language: system
        pass_filenames: false
      - id: migration-contracts
        name: Verify migration security contracts
        entry: python scripts/check_migration_contracts.py
        language: system
        pass_filenames: false
      - id: vercel-security-headers
        name: Verify Vercel security headers
        entry: python scripts/check_vercel_headers.py
        language: system
        pass_filenames: false
