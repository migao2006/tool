name: Import market data

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Fetch and normalize without writing to Supabase
        required: true
        default: false
        type: boolean
  schedule:
    # Weekdays at 19:45 Asia/Taipei, after official daily files settle.
    - cron: "45 11 * * 1-5"

permissions:
  contents: read

concurrency:
  group: import-market-data
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.lock
      - name: Install pinned dependencies
        run: python -m pip install --requirement requirements.lock
      - name: Import audited market data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          API_HTTP_TIMEOUT_SECONDS: "30"
        run: |
          set -uo pipefail
          max_attempts=4
          attempt=1
          while (( attempt <= max_attempts )); do
            rm -f import-market-data-result.json
            set +e
            if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.dry_run }}" == "true" ]]; then
              python -m scripts.import_market_data \
                --dry-run \
                --result-output import-market-data-result.json
            else
              python -m scripts.import_market_data \
                --result-output import-market-data-result.json
            fi
            status=$?
            set -e

            if (( status == 0 )); then
              exit 0
            fi
            if (( status != 75 || attempt == max_attempts )); then
              exit "$status"
            fi

            delay_seconds=$((attempt * 180))
            echo "::warning::TWSE/TPEX source dates are temporarily misaligned; retrying in ${delay_seconds}s (attempt ${attempt}/${max_attempts})."
            sleep "$delay_seconds"
            attempt=$((attempt + 1))
          done
      - name: Preserve sanitized import result
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: import-market-data-result-${{ github.run_id }}-${{ github.run_attempt }}
          path: import-market-data-result.json
          if-no-files-found: warn
          retention-days: 30
