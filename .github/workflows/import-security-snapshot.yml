name: Import current security snapshot

on:
  workflow_dispatch:
    inputs:
      snapshot_date:
        description: Profile observation date; blank resolves a coherent date from both markets
        required: false
        default: ""
        type: string
      dry_run:
        description: Fetch and validate without writing to Supabase
        required: true
        default: true
        type: boolean
  schedule:
    # Weekdays at 20:05 Asia/Taipei, after daily market-data ingestion.
    - cron: "5 12 * * 1-5"

permissions:
  contents: read

concurrency:
  group: import-security-snapshot
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.lock
      - name: Install pinned dependencies
        run: python -m pip install --requirement requirements.lock
      - name: Import audited current security state
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          API_HTTP_TIMEOUT_SECONDS: "30"
          REQUESTED_SNAPSHOT_DATE: ${{ inputs.snapshot_date }}
          DRY_RUN: ${{ inputs.dry_run }}
        shell: bash
        run: |
          args=()
          if [[ -n "$REQUESTED_SNAPSHOT_DATE" ]]; then
            args+=(--snapshot-date "$REQUESTED_SNAPSHOT_DATE")
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "$DRY_RUN" == "true" ]]; then
            args+=(--dry-run)
          fi
          python -m scripts.import_security_snapshot "${args[@]}" \
            | tee security-snapshot-summary.json

      - name: Import unresolved current listing identity evidence
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          API_HTTP_TIMEOUT_SECONDS: "30"
          DRY_RUN: ${{ inputs.dry_run }}
        shell: bash
        run: |
          args=()
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "$DRY_RUN" == "true" ]]; then
            args+=(--dry-run)
          fi
          python -m scripts.import_twse_current_listing_identity "${args[@]}" \
            | tee current-listing-identity-summary.json

      - name: Preserve import audit summary
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-snapshot-import-${{ github.run_id }}
          path: |
            security-snapshot-summary.json
            current-listing-identity-summary.json
          if-no-files-found: warn
          retention-days: 90
