name: Alpha Vantage key check

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/alpha-vantage-key-check.yml"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate Alpha Vantage API key
        env:
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request

          api_key = os.environ.get("ALPHA_VANTAGE_API_KEY", "").strip()
          if not api_key:
              print("ALPHA_VANTAGE_API_KEY_MISSING")
              sys.exit(1)

          query = urllib.parse.urlencode(
              {
                  "function": "GLOBAL_QUOTE",
                  "symbol": "IBM",
                  "apikey": api_key,
              }
          )
          request = urllib.request.Request(
              "https://www.alphavantage.co/query?" + query,
              headers={"User-Agent": "alpha-lens-api-readiness/1.0"},
          )

          try:
              with urllib.request.urlopen(request, timeout=30) as response:
                  status = response.status
                  payload = json.loads(response.read().decode("utf-8"))
          except urllib.error.HTTPError as exc:
              print(f"ALPHA_VANTAGE_HTTP_ERROR status={exc.code}")
              sys.exit(1)
          except Exception as exc:
              print(f"ALPHA_VANTAGE_REQUEST_FAILED type={type(exc).__name__}")
              sys.exit(1)

          quote = payload.get("Global Quote")
          if status == 200 and isinstance(quote, dict) and quote.get("01. symbol") == "IBM":
              print("ALPHA_VANTAGE_OK status=200 symbol=IBM")
              with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
                  summary.write(
                      "## Alpha Vantage\n\n"
                      "PASS: API key accepted and IBM quote returned.\n"
                  )
              sys.exit(0)

          information = str(payload.get("Information", ""))
          if status == 200 and "rate limit" in information.lower():
              print("ALPHA_VANTAGE_VALID_BUT_RATE_LIMITED status=200")
              with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
                  summary.write(
                      "## Alpha Vantage\n\n"
                      "PASS_WITH_LIMIT: API key accepted, but the free daily limit is currently reached.\n"
                  )
              sys.exit(0)

          if payload.get("Error Message"):
              print("ALPHA_VANTAGE_API_ERROR")
          elif information:
              print("ALPHA_VANTAGE_INFORMATION_RESPONSE")
          else:
              print("ALPHA_VANTAGE_UNEXPECTED_RESPONSE")
          sys.exit(1)
          PY
