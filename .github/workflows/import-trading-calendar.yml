name: Import historical trading calendar

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: First requested date (YYYY-MM-DD)
        required: true
        default: "2018-01-01"
        type: string
      end_date:
        description: Last requested date; blank means today
        required: false
        default: ""
        type: string
      dry_run:
        description: Fetch and validate without writing to Supabase
        required: true
        default: true
        type: boolean
  schedule:
    # Sunday 10:45 Asia/Taipei, after the 10:15 delisting-registry import.
    - cron: "45 2 * * 0"

permissions:
  contents: read

concurrency:
  group: import-trading-calendar
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.lock
      - name: Install pinned dependencies
        run: python -m pip install --requirement requirements.lock
      - name: Import verified TWSE sessions
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          API_HTTP_TIMEOUT_SECONDS: "30"
          REQUESTED_START_DATE: ${{ inputs.start_date }}
          REQUESTED_END_DATE: ${{ inputs.end_date }}
          DRY_RUN: ${{ inputs.dry_run }}
        shell: bash
        run: |
          args=(--start-date "${REQUESTED_START_DATE:-2018-01-01}")
          if [[ -n "$REQUESTED_END_DATE" ]]; then
            args+=(--end-date "$REQUESTED_END_DATE")
          fi
          if [[ "$DRY_RUN" == "true" ]]; then
            args+=(--dry-run)
          fi
          python -m scripts.import_trading_calendar "${args[@]}" \
            | tee calendar-import-summary.json
      - name: Preserve import audit summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trading-calendar-import-${{ github.run_id }}
          path: calendar-import-summary.json
          if-no-files-found: warn
          retention-days: 90
