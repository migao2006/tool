name: Historical supplemental backfill worker

on:
  workflow_call:
    inputs:
      credential_slot:
        required: true
        type: string
      max_tasks:
        required: true
        type: number
      allowed_datasets:
        required: true
        type: string
      seed_tasks:
        required: true
        type: boolean
    secrets:
      finmind_token:
        required: true
      r2_access_key_id:
        required: true
      r2_secret_access_key:
        required: true
      supabase_url:
        required: true
      supabase_service_role_key:
        required: true

permissions:
  contents: read

jobs:
  backfill:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv with dependency caching
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Synchronize locked environment
        run: uv sync --frozen

      - name: Run quota-aware TWSE supplemental backfill
        env:
          FINMIND_TOKEN: ${{ secrets.finmind_token }}
          R2_ACCOUNT_ID: ${{ vars.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.r2_access_key_id }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.r2_secret_access_key }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          SUPABASE_URL: ${{ secrets.supabase_url }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.supabase_service_role_key }}
          FINMIND_QUOTA_RESERVE: "20"
          HISTORICAL_BACKFILL_MAX_RUNTIME_SECONDS: "1200"
          HISTORICAL_BACKFILL_STORAGE_TARGET: R2
          HISTORICAL_BACKFILL_MAX_ARCHIVE_OBJECTS_PER_RUN: "100"
          HISTORICAL_BACKFILL_MAX_ARCHIVE_OBJECT_BYTES: "50000000"
          HISTORICAL_BACKFILL_SEED_COMMON_TASKS: ${{ inputs.seed_tasks }}
          HISTORICAL_SUPPLEMENTAL_ALLOWED_DATASETS: ${{ inputs.allowed_datasets }}
        shell: bash
        run: |
          set -euo pipefail
          uv run python -m scripts.backfill_historical_supplemental \
            --start-date 2021-07-19 \
            --end-date 2026-07-17 \
            --max-tasks "${{ inputs.max_tasks }}" \
            --output historical-supplemental-summary.json

      - name: Preserve supplemental audit summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: historical-supplemental-${{ inputs.credential_slot }}-${{ github.run_id }}
          path: historical-supplemental-summary.json
          if-no-files-found: warn
          retention-days: 90
