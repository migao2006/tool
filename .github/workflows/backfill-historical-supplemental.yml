name: Backfill TWSE historical supplemental data

on:
  workflow_dispatch:
    inputs:
      max_tasks:
        description: Maximum symbols processed by each FinMind credential
        required: true
        default: 100
        type: number
      allowed_datasets:
        description: Comma-separated FinMind datasets enabled for this credential tier
        required: true
        default: institutional_flows,margin_short
        type: string
  schedule:
    - cron: "37 * * * *"

permissions:
  contents: read

concurrency:
  group: historical-supplemental-backfill
  cancel-in-progress: false

jobs:
  primary:
    if: ${{ vars.HISTORICAL_SUPPLEMENTAL_BACKFILL_ENABLED == 'true' }}
    uses: ./.github/workflows/historical-supplemental-backfill-worker.yml
    with:
      credential_slot: primary
      max_tasks: ${{ fromJSON(github.event.inputs.max_tasks || '100') }}
      allowed_datasets: ${{ github.event.inputs.allowed_datasets || 'institutional_flows,margin_short' }}
      seed_tasks: true
    secrets:
      finmind_token: ${{ secrets.FINMIND_TOKEN }}
      r2_access_key_id: ${{ secrets.R2_ACCESS_KEY_ID }}
      r2_secret_access_key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      supabase_url: ${{ secrets.SUPABASE_URL }}
      supabase_service_role_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  secondary:
    if: ${{ vars.HISTORICAL_SUPPLEMENTAL_BACKFILL_ENABLED == 'true' }}
    uses: ./.github/workflows/historical-supplemental-backfill-worker.yml
    with:
      credential_slot: secondary
      max_tasks: ${{ fromJSON(github.event.inputs.max_tasks || '100') }}
      allowed_datasets: ${{ github.event.inputs.allowed_datasets || 'institutional_flows,margin_short' }}
      # Seeding is idempotent. Let every worker ensure the queue exists so the
      # first campaign cannot race ahead of the primary worker's seed call.
      seed_tasks: true
    secrets:
      finmind_token: ${{ secrets.FINMIND_TOKEN_SECONDARY }}
      r2_access_key_id: ${{ secrets.R2_ACCESS_KEY_ID }}
      r2_secret_access_key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      supabase_url: ${{ secrets.SUPABASE_URL }}
      supabase_service_role_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  tertiary:
    if: ${{ vars.HISTORICAL_SUPPLEMENTAL_BACKFILL_ENABLED == 'true' }}
    uses: ./.github/workflows/historical-supplemental-backfill-worker.yml
    with:
      credential_slot: tertiary
      max_tasks: ${{ fromJSON(github.event.inputs.max_tasks || '100') }}
      allowed_datasets: ${{ github.event.inputs.allowed_datasets || 'institutional_flows,margin_short' }}
      seed_tasks: true
    secrets:
      finmind_token: ${{ secrets.FINMIND_TOKEN_TERTIARY }}
      r2_access_key_id: ${{ secrets.R2_ACCESS_KEY_ID }}
      r2_secret_access_key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      supabase_url: ${{ secrets.SUPABASE_URL }}
      supabase_service_role_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
