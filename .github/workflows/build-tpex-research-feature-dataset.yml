name: Build TPEX research feature dataset

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tpex-research-feature-dataset
  cancel-in-progress: false

jobs:
  build:
    if: ${{ vars.TPEX_RESEARCH_FEATURE_DATASET_ENABLED == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv with dependency caching
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Synchronize locked environment
        run: uv sync --frozen

      - name: Require private archive credentials
        env:
          R2_ACCOUNT_ID: ${{ vars.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          required=(
            R2_ACCOUNT_ID
            R2_ACCESS_KEY_ID
            R2_SECRET_ACCESS_KEY
            R2_BUCKET_NAME
            SUPABASE_URL
            SUPABASE_SERVICE_ROLE_KEY
          )
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Required TPEX research dataset configuration is not set: $name"
              exit 1
            fi
          done

      - name: Stream verified TPEX archives into feature-only Parquet
        env:
          R2_ACCOUNT_ID: ${{ vars.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: >-
          uv run python -m scripts.build_tpex_research_feature_dataset
          --output tpex-research-features.parquet
          --audit tpex-research-features-audit.json

      - name: Preserve RESEARCH_ONLY feature dataset and audit
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tpex-research-features-${{ github.run_id }}
          path: |
            tpex-research-features.parquet
            tpex-research-features-audit.json
          if-no-files-found: error
          retention-days: 30
