name: Publish TWSE OOS research snapshot

on:
  workflow_dispatch:
    inputs:
      prepared_run_id:
        description: Successful prepared research dataset workflow run ID
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: twse-oos-research-publish
  cancel-in-progress: false

jobs:
  train-and-publish:
    if: ${{ vars.TWSE_RESEARCH_PREDICTION_ENABLED == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    environment: production
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ALPHA_LENS_TARGET_ENVIRONMENT: production
      RESEARCH_PREDICTION_SUPABASE_PUBLISH_ENABLED: "true"
      RESEARCH_PREDICTION_PRODUCTION_PUBLISH_ENABLED: "true"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install uv with dependency caching
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Synchronize locked environment
        run: uv sync --frozen

      - name: Require main and explicit Production credentials
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REF" = "refs/heads/main"
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_SERVICE_ROLE_KEY"

      - name: Download verified prepared research dataset
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: twse-prepared-research-${{ inputs.prepared_run_id }}
          path: inputs/prepared
          github-token: ${{ github.token }}
          run-id: ${{ inputs.prepared_run_id }}

      - name: Train OOS models and publish conservative research rows
        run: >-
          uv run python -m scripts.publish_twse_research_snapshot
          --input inputs/prepared/twse-prepared-research.parquet
          --input-audit inputs/prepared/twse-prepared-research-audit.json
          --artifact-root artifacts
          --report twse-research-publish-report.json
          --horizon 5
          --publish-supabase

      - name: Preserve OOS research artifacts and publish audit
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: twse-oos-research-${{ github.run_id }}
          path: |
            artifacts/**/*
            twse-research-publish-report.json
          if-no-files-found: error
          retention-days: 90
