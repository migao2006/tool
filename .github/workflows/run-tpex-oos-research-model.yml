name: Run TPEX OOS research model

on:
  workflow_dispatch:
    inputs:
      prepared_run_id:
        description: Successful TPEX prepared research dataset workflow run ID
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: tpex-oos-research-model
  cancel-in-progress: false

jobs:
  train:
    if: ${{ vars.TPEX_RESEARCH_MODEL_ENABLED == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv with dependency caching
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Synchronize locked environment
        run: uv sync --frozen

      - name: Download verified TPEX prepared artifact
        uses: actions/download-artifact@v7
        with:
          name: tpex-prepared-research-${{ inputs.prepared_run_id }}
          path: inputs/prepared
          github-token: ${{ github.token }}
          run-id: ${{ inputs.prepared_run_id }}

      - name: Run isolated purged walk-forward research
        run: >-
          uv run python -m scripts.run_tpex_research_model
          --input inputs/prepared/tpex-prepared-research.parquet
          --input-audit inputs/prepared/tpex-prepared-research-audit.json
          --artifact-root artifacts
          --report tpex-research-model-report.json
          --horizon 5

      - name: Preserve TPEX research outputs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tpex-oos-research-${{ github.run_id }}
          path: |
            artifacts/**/*
            tpex-research-model-report.json
          if-no-files-found: error
          retention-days: 90
