name: Publish TWSE latest research snapshot

on:
  workflow_dispatch:
    inputs:
      prepared_run_id:
        description: Successful prepared research dataset workflow run ID
        required: true
        type: string
      feature_run_id:
        description: Successful v2 feature dataset workflow run ID
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: twse-latest-research-publish
  cancel-in-progress: false

jobs:
  infer-and-publish:
    if: ${{ vars.TWSE_DAILY_RESEARCH_PREDICTION_ENABLED == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 150
    environment: production
    env:
      PREPARED_RUN_ID: ${{ inputs.prepared_run_id }}
      FEATURE_RUN_ID: ${{ inputs.feature_run_id }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ALPHA_LENS_TARGET_ENVIRONMENT: production
      RESEARCH_PREDICTION_SUPABASE_PUBLISH_ENABLED: "true"
      RESEARCH_PREDICTION_PRODUCTION_PUBLISH_ENABLED: "true"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Verify artifact-producing workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          git fetch --no-tags origin \
            "+refs/heads/main:refs/remotes/origin/main"

          verify_run() {
            local label="$1"
            local run_id="$2"
            local expected_workflow="$3"
            local conclusion
            local head_branch
            local head_sha
            local workflow_path

            if [[ ! "$run_id" =~ ^[1-9][0-9]*$ ]]; then
              echo "Invalid ${label} workflow run ID"
              return 1
            fi

            IFS=$'\t' read -r conclusion head_branch head_sha workflow_path < <(
              gh api \
                "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}" \
                --jq '[.conclusion // "", .head_branch // "", .head_sha // "", .path // ""] | @tsv'
            )
            workflow_path="${workflow_path%%@*}"

            if [[ "$workflow_path" != "$expected_workflow" ]]; then
              echo "Untrusted ${label} workflow path: ${workflow_path}"
              return 1
            fi
            if [[ "$conclusion" != "success" || "$head_branch" != "main" ]]; then
              echo "Untrusted ${label} workflow result or branch"
              return 1
            fi
            if [[ ! "$head_sha" =~ ^[0-9a-f]{40}$ ]]; then
              echo "Invalid ${label} workflow head SHA"
              return 1
            fi
            if ! git merge-base --is-ancestor "$head_sha" origin/main; then
              echo "Untrusted ${label} workflow head is not an origin/main ancestor"
              return 1
            fi
          }

          verify_run \
            "prepared dataset" \
            "$PREPARED_RUN_ID" \
            ".github/workflows/build-twse-prepared-research-dataset.yml"
          verify_run \
            "feature dataset" \
            "$FEATURE_RUN_ID" \
            ".github/workflows/build-twse-research-feature-dataset.yml"

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install uv with dependency caching
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Synchronize locked environment
        run: uv sync --frozen

      - name: Require main and explicit Production credentials
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REF" = "refs/heads/main"
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_SERVICE_ROLE_KEY"

      - name: Download verified prepared research dataset
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: twse-prepared-research-${{ env.PREPARED_RUN_ID }}
          path: inputs/prepared
          github-token: ${{ github.token }}
          run-id: ${{ env.PREPARED_RUN_ID }}

      - name: Download verified feature-only dataset
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: twse-research-features-${{ env.FEATURE_RUN_ID }}
          path: inputs/features
          github-token: ${{ github.token }}
          run-id: ${{ env.FEATURE_RUN_ID }}

      - name: Fit frozen bundle and publish latest research inference
        run: >-
          uv run python -m scripts.publish_twse_daily_research_snapshot
          --prepared-input inputs/prepared/twse-prepared-research.parquet
          --prepared-audit inputs/prepared/twse-prepared-research-audit.json
          --feature-input inputs/features/twse-research-features.parquet
          --feature-audit inputs/features/twse-research-features-audit.json
          --artifact-root artifacts
          --report twse-latest-research-publish-report.json
          --horizon 5
          --publish-supabase

      - name: Preserve model bundle, research snapshot, and audit
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: twse-latest-research-${{ github.run_id }}
          path: |
            artifacts/**/*
            twse-latest-research-publish-report.json
          if-no-files-found: error
          retention-days: 90
